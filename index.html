<!DOCTYPE html>
<html lang="en">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>Apple Pay cross-domain iframe test</title>
  <style>
    :root {
      color-scheme: light dark;
    }

    * {
      box-sizing: border-box;
    }

    body {
      margin: 0;
      font-family: -apple-system, BlinkMacSystemFont, "Segoe UI", Roboto, Helvetica, Arial, sans-serif;
      background: #f5f5f7;
      color: #1d1d1f;
      display: flex;
      flex-direction: column;
      min-height: 100vh;
    }

    header {
      padding: 20px 24px;
      background: #fff;
      border-bottom: 1px solid #d2d2d7;
    }

    header h1 {
      margin: 0 0 6px;
      font-size: 20px;
    }

    header p {
      margin: 0;
      font-size: 14px;
      color: #6e6e73;
      word-break: break-all;
    }

    code {
      font-family: Menlo, Monaco, Consolas, "Courier New", monospace;
      font-size: 13px;
      background: #f2f2f7;
      padding: 2px 4px;
      border-radius: 4px;
    }

    .frame-wrapper {
      flex: 1;
      padding: 24px;
      display: flex;
    }

    iframe {
      flex: 1;
      width: 100%;
      min-height: 600px;
      border: 1px solid #d2d2d7;
      border-radius: 12px;
      background: #fff;
    }
  </style>
</head>
<body>
  <header>
    <h1>Apple Pay cross-domain iframe test</h1>
    <p>Parent domain hosts this page.<br>iframe loads <code>https://wallets-test-suite.cko.solutions</code> with <code>allow="payment *"</code>.</p>
  </header>

  <div class="frame-wrapper">
    <iframe
      src="https://wallets-test-suite.cko.solutions"
      allow="payment *"
      title="Wallets Test Suite"></iframe>
  </div>
</body>
</html>
